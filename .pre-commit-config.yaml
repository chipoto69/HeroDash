# Pre-commit hooks configuration for herodash
# See https://pre-commit.com for more information

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # Allow custom YAML tags
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  # Python-specific checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-ast
      - id: check-builtin-literals
      - id: check-docstring-first
      - id: debug-statements
      - id: name-tests-test
        args: [--pytest-test-first]
        exclude: ^(tests/conftest\.py|Modular_PROPOSAL/tests/)

  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Run the formatter
      - id: ruff-format

  # Shell script validation
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=error]
        exclude: ^(hero_core.*\.sh|agents/launch_agents\.sh)

  # Security check for Python dependencies
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^(tests/|Modular_PROPOSAL/|monitors/|agents/|test_communication_layer\.py|nats_.*\.py|inter_agent_communication\.py|agent_.*\.py)

  # Type checking with mypy (lenient configuration for existing codebase)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML
          - types-requests
        args:
          - --ignore-missing-imports
          - --no-strict-optional
          - --allow-untyped-defs
          - --allow-incomplete-defs
          - --no-warn-return-any
        exclude: ^(tests/|Modular_PROPOSAL/|monitors/|agents/|test_communication_layer\.py|nats_.*\.py|inter_agent_communication\.py|agent_.*\.py|run_communication_system\.py|task_manager\.py|web_dashboard\.py)

# Configuration for default settings
default_language_version:
  python: python3

# Files to exclude globally
exclude: |
  (?x)^(
    archive_old_versions/|
    hero_debug\.|
    \.git/|
    \.cache/|
    __pycache__/|
    \.pytest_cache/
  )
